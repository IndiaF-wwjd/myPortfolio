		<link rel="shortcut icon" href="favicon.ico">

		<main>
			<h1>Miles Per Gallon Calculator</h1>
			<form id="mpg_form">
				<input type="text" id="miles" required autofocus placeholder="Enter miles">
				<label for="miles" name="Miles Driven:"></label>
				<input type="text" id="gallons" required placeholder="Enter Gallons">
				<label for="gallons" name="Gallons Used:"></label>
				<input type="text" id="mpg" disabled>
				<label for="mpg" name="Miles Per Gallon:"></label>
				<input type="button" id="calculate" value="Calculate">
				<label>&nbsp;</label>
				<input type="reset" name="reset" id="reset">
			</form>
			<script src="scripts/MilesPerGallon.js"></script>
